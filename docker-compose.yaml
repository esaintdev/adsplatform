version: '3.8'

services:
  ads-v4:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ads-v4
    restart: always
    ports:
      - "3008:3008"
    environment:
      - PORT=3008
      - DATABASE_URL=postgresql://postgres:uzomary_adstracking@127.0.0.1:5432/adstracking
      - DATABASE_SSL=false
      - JWT_SECRET=adtrack_vps_production_secret_2024
      - NEXT_PUBLIC_TRACKER_URL=https://track.stakerschoiceads.com
      - NODE_ENV=production
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  default:
    name: ads-network
